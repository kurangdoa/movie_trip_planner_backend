  chromadb:
    image: chromadb/chroma:1.5.3
    volumes:
      - chroma_data:/data
    expose:
      - "8000"
    # ports:
    #   - "8201:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # clickhouse:
  #   image: clickhouse/clickhouse-server:26.2.4
  #   volumes:
  #     - ./_clickhouse-data:/var/lib/clickhouse
  #   ports:
  #     - "8202:8123" #ui http://localhost:8202/play
  #     - "9000:9000"
  #   environment:
  #     - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 
  #     - CLICKHOUSE_DB=hotel_movie
  #     - CLICKHOUSE_USER=app_user
  #     - CLICKHOUSE_PASSWORD=${CLICKHOUSE_APP_PASS}
  #   ulimits:
  #     nofile:
  #       soft: 262144
  #       hard: 262144
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 8G
  #       reservations:
  #         memory: 4G

  backend:
    build:
      context: .              # This tells Docker the "Universe" starts at MOVIE_TRIP_PLANNER
      dockerfile: Dockerfile
    # expose:
    #   - "8000"
    ports:
      - "8000:8000" # Maps local port 8000 to container port 80
    environment:
      - CHROMA_HOST=chromadb  # This matches the service name above
      - CHROMA_PORT=8000       # Internal port inside the Docker network
      # - CLICKHOUSE_HOST=clickhouse  # Matches the name of your ClickHouse service block!
      # - CLICKHOUSE_PORT=8123        # The default internal HTTP port
    depends_on:
      # - clickhouse
      - chromadb
    volumes:
      - duckdb_data:/app/_duckdb-data
      - /app/.venv  # <--- DO NOT REMOVE THIS. It keeps the Linux venv safe.
    command: ["uv", "run", "fastapi", "run", "backend/main.py", "--port", "8000", "--host", "0.0.0.0"]

volumes:
  chroma_data:
  duckdb_data: