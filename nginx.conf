events { 
    worker_connections 1024; 
    }

http {
    server {
        listen 80;
        server_name api.vibematcher.com localhost; # Whatever your backend domain is

        location / {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}