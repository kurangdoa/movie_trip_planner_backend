services:

  chromadb-local:
    container_name: chromadb-local
    image: chromadb/chroma:1.5.3
    volumes:
      - chroma_data:/data
    ports:
      - "8201:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - movie-network

  backend-local:
    container_name: backend-local
    build:
      context: .              
      dockerfile: Dockerfile
    env_file:
      - .env  
    ports:
      - "8203:8000" 
    environment:
      - CHROMA_HOST=chromadb-local
      - CHROMA_PORT=8000
    depends_on:
      - chromadb-local
    volumes:
      - ./_duckdb-data:/app/_duckdb-data
      - .:/app
      - /app/.venv  
    command: ["uv", "run", "fastapi", "dev", "backend/main.py", "--port", "8000", "--host", "0.0.0.0"]
    networks:
      - movie-network
      - langfuse_default
      - mlflow-network

